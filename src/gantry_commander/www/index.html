<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Gantry Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    
    <style>
        /* Reset and Typography */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0d0d0d; 
            color: #d1d1d1; 
            margin: 0;
            padding: 40px 20px;
            font-weight: 300;
        }
        h1, h2, h3 { 
            font-weight: 400; 
            letter-spacing: 1px; 
            color: #ffffff;
            margin-bottom: 15px;
        }
        
        .header { 
            text-align: center; 
            margin-bottom: 40px; 
        }
        .header p {
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        /* Flexbox Layout */
        .container {
            display: flex;
            justify-content: center;
            align-items: stretch;
            max-width: 900px;
            margin: 0 auto;
            gap: 30px;
        }

        /* Clean Panels */
        .panel {
            flex: 1; 
            background: #141414;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #262626;
            display: flex;
            flex-direction: column;
        }

        /* Outline Buttons */
        .btn { 
            background: transparent;
            color: #d1d1d1;
            padding: 12px 20px; 
            font-size: 13px; 
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 12px; 
            cursor: pointer; 
            border-radius: 4px; 
            border: 1px solid #333; 
            width: 100%; 
            transition: all 0.2s ease;
        }
        .btn:hover { background: #1f1f1f; border-color: #555; }
        
        .btn.home { border-color: #1565c0; color: #64b5f6; }
        .btn.open { border-color: #2e7d32; color: #81c784; }
        .btn.close { border-color: #c62828; color: #e57373; }
        .btn.moveit { border-color: #6a1b9a; color: #ba68c8; }
        
        /* E-Stop*/
        .btn.estop { 
            background: #c62828; 
            color: white; 
            border-color: #c62828; 
            font-weight: 600; 
            margin-top: auto;
        }
        .btn.estop:hover { background: #b71c1c; }

        .btn-row {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        /* Log Box */
        #logBox {
            flex-grow: 1;
            background: #0a0a0a;
            color: #0f0;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 12px;
            overflow-y: auto;
            text-align: left;
            padding: 15px;
            border: 1px solid #262626;
            border-radius: 4px;
            height: 400px;
            line-height: 1.6;
        }

        /* Joystick Container */
        .joystick-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 30px;
            margin-bottom: 20px;
        }
        #joystick-zone {
            width: 140px;
            height: 140px;
            position: relative;
            background: #0a0a0a;
            border-radius: 50%;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Gantry Terminal</h1>
        <p>
            STATUS: <span id="status" style="color: #e57373;">DISCONNECTED</span> &nbsp;|&nbsp; 
            STATE: <span id="gantry_state" style="color: #ffd54f;">WAITING</span>
        </p>
    </div>

    <div class="container">
        
        <div class="panel">
            <h2 style="font-size: 16px; margin-top: 0;">Commands</h2>
            
            <button class="btn home" onclick="sendCommand('HOME')">Home Gantry</button>
            
            <div class="btn-row">
                <button class="btn open" onclick="sendCommand('OPEN')">Open</button>
                <button class="btn close" onclick="sendCommand('CLOSE')">Close</button>
            </div>
            
            <button class="btn moveit" onclick="sendCommand('STREAM_ON')">Enable MoveIt</button>
            
            <div class="joystick-wrapper">
                <h3 style="font-size: 12px; color: #666; text-transform: uppercase;">Manual Jog</h3>
                <div id="joystick-zone"></div>
            </div>

            <button class="btn estop" onclick="sendCommand('S')">EMERGENCY STOP</button>
        </div>

        <div class="panel">
            <h2 style="font-size: 16px; margin-top: 0;">System Logs</h2>
            <div id="logBox">Awaiting connection...<br></div>
        </div>

    </div>

    <script>
        var ros = new ROSLIB.Ros({ url : 'ws://' + window.location.hostname + ':9090' });

        ros.on('connection', function() {
            document.getElementById('status').innerHTML = 'CONNECTED';
            document.getElementById('status').style.color = '#81c784';
        });

        ros.on('close', function() {
            document.getElementById('status').innerHTML = 'DISCONNECTED';
            document.getElementById('status').style.color = '#e57373';
        });

        var cmdTopic = new ROSLIB.Topic({
            ros : ros,
            name : '/web_ui_cmd',
            messageType : 'std_msgs/String'
        });

        var statusListener = new ROSLIB.Topic({
            ros : ros,
            name : '/gantry_status',
            messageType : 'std_msgs/String'
        });

        statusListener.subscribe(function(message) {
            var stateSpan = document.getElementById('gantry_state');
            stateSpan.innerHTML = message.data;
            if (message.data === 'HOMED') {
                stateSpan.style.color = '#81c784';
            } else if (message.data === 'HOMING...') {
                stateSpan.style.color = '#ffd54f';
            } else {
                stateSpan.style.color = '#d1d1d1';
            }
        });

        var logListener = new ROSLIB.Topic({
            ros : ros,
            name : '/web_log',
            messageType : 'std_msgs/String'
        });

        logListener.subscribe(function(message) {
            var logBox = document.getElementById('logBox');
            logBox.innerHTML += message.data + "<br>";
            logBox.scrollTop = logBox.scrollHeight; 
        });

        function sendCommand(val) {
            var msg = new ROSLIB.Message({ data: val });
            cmdTopic.publish(msg);
            
            var logBox = document.getElementById('logBox');
            var logColor = val.startsWith("JOG") ? "#FF9800" : "#00bcd4";
            logBox.innerHTML += "<span style='color: " + logColor + ";'>&gt; CMD: " + val + "</span><br>";
            logBox.scrollTop = logBox.scrollHeight;
        }

        // ==========================================
        // VIRTUAL JOYSTICK SETUP
        // ==========================================
        var joystickZone = document.getElementById('joystick-zone');
        var manager = nipplejs.create({
            zone: joystickZone,
            mode: 'static',
            position: { left: '50%', top: '50%' },
            color: '#666666', 
            size: 100
        });

        manager.on('dir:up', function () { sendCommand('JOG_Y+'); });
        manager.on('dir:down', function () { sendCommand('JOG_Y-'); });
        manager.on('dir:left', function () { sendCommand('JOG_X-'); });
        manager.on('dir:right', function () { sendCommand('JOG_X+'); });
        manager.on('end', function () { sendCommand('JOG_STOP'); });

    </script>
</body>
</html>
