controller_manager:
  ros__parameters:
    update_rate: 50
    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

arm_controller:
  ros__parameters:
    joints:
      - x_axis_joint
      - y_axis_joint
      - z_axis_lift_joint
    command_interfaces:
      - position
    state_interfaces:
      - position